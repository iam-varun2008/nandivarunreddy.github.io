<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nandi Varun Reddy - Computer Science and Cybersecurity Applicant Portfolio"
    />
    <title>Nandi Varun Reddy | CS & Cybersecurity Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script>
      window.Motion = window.FramerMotion || window.Motion;
      const originalConsoleError = console.error;
      console.error = (...args) => {
        const first = String(args[0] || "");
        if (first.includes('Each child in a list should have a unique "key" prop')) return;
        originalConsoleError(...args);
      };
    </script>
    <style>
      :root {
        --text: rgba(255, 255, 255, 0.94);
        --muted: rgba(229, 238, 248, 0.68);
        --line: rgba(255, 255, 255, 0.2);
        --cyan: #9cefff;
        --mint: #b7ffd8;
        --gold: #ffe2a0;
        --pink: #ffb8ee;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #020308;
        color: var(--text);
        font-family: "Barlow", system-ui, sans-serif;
        overflow-x: hidden;
      }

      body.gate-open {
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      label {
        font: inherit;
      }

      .own-video-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: -3;
        pointer-events: none;
      }

      .ambient-layer {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        background:
          radial-gradient(circle at 18% 22%, rgba(98, 233, 255, 0.14), transparent 31%),
          radial-gradient(circle at 78% 24%, rgba(198, 112, 255, 0.13), transparent 28%),
          linear-gradient(115deg, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.56));
        mix-blend-mode: screen;
      }

      .grain {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.16;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 86px 86px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.12));
      }

      .topbar {
        position: fixed;
        top: 18px;
        left: 0;
        right: 0;
        width: min(1240px, calc(100vw - 28px));
        margin: 0 auto;
        z-index: 50;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
        padding: 10px 12px 10px 18px;
        border-radius: 999px;
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.035)),
          radial-gradient(circle at 12% 0%, rgba(156, 239, 255, 0.12), transparent 42%);
        border: 0;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.025),
          0 24px 90px rgba(0, 0, 0, 0.34),
          0 0 70px rgba(156, 239, 255, 0.08);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
        font-weight: 700;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: #071116;
        background: linear-gradient(135deg, var(--cyan), var(--gold));
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 22px;
        box-shadow: 0 0 28px rgba(156, 239, 255, 0.35);
      }

      .navlinks {
        display: flex;
        justify-content: center;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .navlinks::-webkit-scrollbar {
        display: none;
      }

      .navlinks a,
      .language-chip,
      .email-chip {
        position: relative;
        flex: 0 0 auto;
        border: 1px solid transparent;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.72);
        background: transparent;
        padding: 11px 13px;
        font-size: 14px;
        font-weight: 700;
        box-shadow: none;
        transition:
          color 200ms ease,
          background 200ms ease,
          border-color 200ms ease,
          transform 200ms ease,
          box-shadow 200ms ease;
      }

      .navlinks a:hover,
      .navlinks a.active,
      .language-chip.active,
      .language-chip:hover,
      .email-chip:hover {
        color: white;
        border-color: rgba(255, 255, 255, 0.1);
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.055));
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.12),
          0 10px 42px rgba(156, 239, 255, 0.12);
        transform: translateY(-2px);
      }

      .top-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .language-chip {
        cursor: pointer;
        color: rgba(255, 255, 255, 0.86);
      }

      .email-chip {
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .gate {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 22%, rgba(96, 230, 255, 0.24), transparent 34%),
          radial-gradient(circle at 78% 30%, rgba(217, 142, 255, 0.18), transparent 28%),
          rgba(2, 3, 8, 0.76);
        backdrop-filter: blur(12px);
      }

      .gate-card {
        width: min(620px, 100%);
        border-radius: 30px;
        padding: clamp(26px, 5vw, 56px);
        text-align: center;
        background:
          linear-gradient(140deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.05)),
          linear-gradient(40deg, rgba(156, 239, 255, 0.1), rgba(255, 226, 160, 0.14));
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.2),
          0 34px 130px rgba(0, 0, 0, 0.46);
        backdrop-filter: blur(28px) saturate(145%);
        -webkit-backdrop-filter: blur(28px) saturate(145%);
      }

      .gate-kicker,
      .kicker {
        margin: 0 0 18px;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .gate-card h1,
      .section-title,
      .hero-title {
        font-family: "Instrument Serif", Georgia, serif;
        font-weight: 400;
      }

      .gate-card h1 {
        margin: 0;
        font-size: clamp(58px, 9vw, 96px);
        line-height: 0.88;
      }

      .gate-card h1 span {
        display: block;
        color: #ffe2a0;
        font-family: "Barlow", system-ui, sans-serif;
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 800;
        line-height: 1.1;
      }

      .gate-subtitle {
        max-width: 420px;
        margin: 28px auto 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 19px;
        line-height: 1.55;
      }

      .gate-actions,
      .hero-actions,
      .button-row {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 34px;
      }

      .liquid-button,
      .upload-button {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        min-height: 48px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 14px 21px;
        color: white;
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.06)),
          radial-gradient(circle at 20% 0%, rgba(156, 239, 255, 0.34), transparent 42%),
          radial-gradient(circle at 80% 100%, rgba(255, 226, 160, 0.26), transparent 46%);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.22),
          0 18px 58px rgba(88, 194, 238, 0.18);
        cursor: pointer;
        overflow: hidden;
        backdrop-filter: blur(18px) saturate(150%);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
        font-weight: 800;
      }

      .liquid-button::after,
      .upload-button::after {
        content: "";
        position: absolute;
        top: -70%;
        left: -36%;
        width: 52%;
        height: 220%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.44), transparent);
        transform: rotate(24deg);
        opacity: 0;
        transition: transform 650ms ease, opacity 260ms ease;
      }

      .liquid-button:hover::after,
      .upload-button:hover::after {
        opacity: 1;
        transform: translateX(280%) rotate(24deg);
      }

      .liquid-button.secondary {
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
          radial-gradient(circle at 78% 12%, rgba(206, 182, 255, 0.24), transparent 44%);
      }

      .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        z-index: 90;
        transform-origin: 0 50%;
        background: linear-gradient(90deg, var(--cyan), var(--mint), var(--gold), var(--pink));
        box-shadow: 0 0 26px rgba(156, 239, 255, 0.55);
      }

      .section-shell {
        position: relative;
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: 140px 24px 98px;
        isolation: isolate;
      }

      .section-inner {
        width: min(1160px, calc(100vw - 38px));
        margin: 0 auto;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.75fr);
        align-items: center;
        gap: clamp(32px, 6vw, 90px);
      }

      .hero-title {
        margin: 0;
        max-width: 780px;
        font-size: clamp(70px, 11vw, 172px);
        line-height: 0.78;
      }

      .hero-title em {
        color: var(--gold);
        font-style: italic;
      }

      .lead {
        max-width: 650px;
        margin: 28px 0 0;
        color: rgba(255, 255, 255, 0.75);
        font-size: clamp(18px, 2.1vw, 23px);
        line-height: 1.55;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .orbital-card {
        min-height: 520px;
        border-radius: 34px;
        padding: 22px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.035)),
          radial-gradient(circle at 30% 18%, rgba(156, 239, 255, 0.22), transparent 34%),
          radial-gradient(circle at 84% 80%, rgba(255, 226, 160, 0.2), transparent 36%);
        border: 1px solid rgba(255, 255, 255, 0.17);
        box-shadow: 0 26px 110px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        overflow: hidden;
      }

      .orbit {
        position: relative;
        height: 100%;
        min-height: 476px;
        border-radius: 28px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1), transparent 22%),
          linear-gradient(160deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
      }

      .orbit-ring,
      .orbit-ring::before,
      .orbit-ring::after {
        position: absolute;
        content: "";
        inset: 16%;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .orbit-ring::before {
        inset: -22%;
        transform: rotate(22deg) scaleX(1.35);
      }

      .orbit-ring::after {
        inset: 22%;
        transform: rotate(-18deg) scaleX(1.45);
      }

      .floating-chip {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 12px 15px;
        color: white;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.17);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(16px);
        font-weight: 800;
      }

      .floating-chip:nth-child(2) {
        top: 12%;
        left: 8%;
      }

      .floating-chip:nth-child(3) {
        top: 44%;
        right: 7%;
      }

      .floating-chip:nth-child(4) {
        bottom: 12%;
        left: 18%;
      }

      .profile-core {
        position: absolute;
        inset: 50% auto auto 50%;
        width: min(260px, 58%);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 999px;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.75), transparent 24%),
          radial-gradient(circle at 60% 70%, rgba(156, 239, 255, 0.45), transparent 48%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.05));
        border: 1px solid rgba(255, 255, 255, 0.26);
        box-shadow:
          inset -16px -24px 45px rgba(0, 0, 0, 0.2),
          0 0 80px rgba(156, 239, 255, 0.22);
      }

      .profile-core span {
        color: rgba(3, 14, 20, 0.82);
        font-size: clamp(56px, 8vw, 96px);
        font-weight: 800;
      }

      .split-layout {
        display: grid;
        grid-template-columns: minmax(260px, 0.76fr) minmax(0, 1fr);
        gap: clamp(30px, 5vw, 76px);
        align-items: start;
      }

      .section-title {
        margin: 0;
        font-size: clamp(64px, 9vw, 132px);
        line-height: 0.82;
      }

      .section-copy {
        color: rgba(255, 255, 255, 0.74);
        font-size: 20px;
        line-height: 1.65;
      }

      .card-grid,
      .cert-list,
      .skills-grid,
      .art-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .card-grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .glass-card {
        position: relative;
        border-radius: 28px;
        min-height: 170px;
        padding: 23px;
        background:
          linear-gradient(140deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.045)),
          radial-gradient(circle at 16% 8%, rgba(156, 239, 255, 0.16), transparent 46%);
        border: 1px solid rgba(255, 255, 255, 0.17);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.16),
          0 22px 70px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(22px) saturate(138%);
        -webkit-backdrop-filter: blur(22px) saturate(138%);
        overflow: hidden;
      }

      .glass-card::after {
        content: "";
        position: absolute;
        inset: auto -20% -55% -20%;
        height: 120px;
        background: radial-gradient(ellipse at center, rgba(156, 239, 255, 0.2), transparent 66%);
        opacity: 0;
        transition: opacity 280ms ease;
      }

      .glass-card:hover::after {
        opacity: 1;
      }

      .glass-card h3 {
        margin: 0;
        font-size: 23px;
        line-height: 1.15;
        transition:
          color 240ms ease,
          text-shadow 240ms ease,
          transform 240ms ease;
      }

      .glass-card p {
        color: rgba(255, 255, 255, 0.68);
        line-height: 1.55;
        transition:
          color 240ms ease,
          text-shadow 240ms ease;
      }

      .glass-card:hover h3 {
        color: #fff3c7;
        text-shadow:
          0 0 22px rgba(255, 226, 160, 0.26),
          0 0 46px rgba(255, 226, 160, 0.12);
        transform: translateY(-2px);
      }

      .glass-card:hover p {
        color: rgba(255, 246, 213, 0.82);
        text-shadow: 0 0 20px rgba(255, 226, 160, 0.1);
      }

      .big-stat {
        margin: 16px 0 6px;
        color: white;
        font-size: clamp(38px, 5vw, 62px);
        font-weight: 800;
        line-height: 0.95;
        overflow-wrap: anywhere;
      }

      .education-grid .glass-card {
        min-height: 285px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .education-score {
        font-size: clamp(38px, 4.6vw, 64px);
        transition:
          transform 240ms ease,
          text-shadow 240ms ease,
          color 240ms ease;
      }

      .glass-card:hover .education-score {
        transform: translateY(-3px) scale(1.025);
        color: #fff6d5;
        text-shadow: 0 0 28px rgba(255, 226, 160, 0.28);
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .tag {
        border-radius: 999px;
        padding: 8px 11px;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 13px;
        font-weight: 800;
        transition:
          transform 220ms ease,
          background 220ms ease,
          border-color 220ms ease,
          box-shadow 220ms ease;
      }

      .tag:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow: 0 14px 38px rgba(156, 239, 255, 0.13);
      }

      .project-card {
        display: grid;
        grid-template-columns: minmax(240px, 0.82fr) minmax(0, 1.18fr);
        gap: 20px;
        min-height: 520px;
      }

      .project-section-inner {
        display: grid;
        gap: 34px;
      }

      .project-heading-block {
        width: min(850px, 100%);
      }

      .project-lab-grid {
        display: grid;
        grid-template-columns: minmax(250px, 0.34fr) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .project-lab-panel {
        position: sticky;
        top: 218px;
        min-height: 520px;
      }

      .project-lab-flow {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }

      .project-flow-step {
        position: relative;
        border-radius: 22px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        transition:
          transform 240ms ease,
          background 240ms ease,
          box-shadow 240ms ease,
          border-color 240ms ease;
      }

      .project-flow-step:hover {
        transform: translateY(-7px) scale(1.015);
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 18px 58px rgba(156, 239, 255, 0.14);
      }

      .project-flow-step strong {
        transition:
          color 220ms ease,
          text-shadow 220ms ease;
      }

      .project-flow-step:hover strong {
        color: #fff3c7;
        text-shadow: 0 0 22px rgba(255, 226, 160, 0.28);
      }

      .project-flow-step strong {
        display: block;
        color: white;
        margin-bottom: 5px;
      }

      .project-flow-step span {
        color: rgba(255, 255, 255, 0.68);
        line-height: 1.45;
      }

      .project-copy {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-width: 0;
      }

      .project-media-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .media-tile {
        min-width: 0;
        border: 0;
        text-align: left;
        color: white;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.15);
        cursor: zoom-in;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.25);
      }

      .media-tile img {
        display: block;
        width: 100%;
        height: 150px;
        object-fit: cover;
        object-position: left top;
        filter: saturate(1.04) contrast(1.02);
      }

      .media-tile span {
        display: block;
        padding: 11px 12px 13px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        line-height: 1.35;
      }

      .skill-card ul {
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .skill-card li {
        border-radius: 999px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.76);
        transition:
          transform 220ms ease,
          background 220ms ease,
          box-shadow 220ms ease,
          border-color 220ms ease;
      }

      .skill-card li:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.22);
        color: #fff3c7;

      function scrollToSection(id) {
        const node = document.getElementById(id);
        if (!node) return;
        const target = id === "home" ? node : node.querySelector(".section-inner") || node;
        const header = document.querySelector(".topbar");
        const headerHeight = header ? header.getBoundingClientRect().height : 96;
        const top = target.getBoundingClientRect().top + window.scrollY - headerHeight - 26;
        window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
        window.history.replaceState(null, "", `#${id}`);
      }

      function mix(a, b, t) {
        return a + (b - a) * t;
      }

      function hexToRgb(hex) {
        const raw = hex.replace("#", "");
        return [parseInt(raw.slice(0, 2), 16), parseInt(raw.slice(2, 4), 16), parseInt(raw.slice(4, 6), 16)];
      }

      function ScrollCanvas() {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d", { alpha: false });
          const pointer = { x: 0.52, y: 0.48 };
          const palettes = [
            ["#0a2f38", "#2d1645", "#caa858"],
            ["#11245a", "#00485b", "#b7ffd8"],
            ["#3a1d54", "#173d45", "#ffb8ee"],
            ["#0e382b", "#382b16", "#9cefff"],
            ["#2b2455", "#091016", "#ffe2a0"]
          ].map((set) => set.map(hexToRgb));
          const particles = Array.from({ length: 84 }, () => ({
            x: Math.random(),
            y: Math.random(),
            size: Math.random() * 1.9 + 0.35,
            speed: Math.random() * 0.18 + 0.04,
            drift: Math.random() * 1.8 + 0.4,
            phase: Math.random() * Math.PI * 2,
            depth: Math.random()
          }));
          let width = 0;
          let height = 0;
          let raf = 0;
          let scrollEase = 0;

          function resize() {
            const ratio = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = Math.floor(width * ratio);
            canvas.height = Math.floor(height * ratio);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
          }

          function colorAt(progress, channel) {
            const total = palettes.length - 1;
            const raw = Math.min(total, Math.max(0, progress * total));
            const idx = Math.floor(raw);
            const next = Math.min(total, idx + 1);
            const t = raw - idx;
            const c1 = palettes[idx][channel];
            const c2 = palettes[next][channel];
            return [Math.round(mix(c1[0], c2[0], t)), Math.round(mix(c1[1], c2[1], t)), Math.round(mix(c1[2], c2[2], t))];
          }

          function rgba(rgb, alpha) {
            return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
          }

          function draw(now) {
            const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
            const target = Math.min(1, Math.max(0, window.scrollY / maxScroll));
            scrollEase += (target - scrollEase) * 0.045;
            const primary = colorAt(scrollEase, 0);
            const secondary = colorAt(scrollEase, 1);
            const accent = colorAt(scrollEase, 2);

            const bg = ctx.createLinearGradient(0, 0, width, height);
            bg.addColorStop(0, rgba(primary, 0.72));
            bg.addColorStop(0.5, "#020308");
            bg.addColorStop(1, rgba(secondary, 0.68));
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, width, height);

            const cx = width * (0.42 + (pointer.x - 0.5) * 0.12 + Math.sin(now * 0.00008) * 0.04);
            const cy = height * (0.48 + (pointer.y - 0.5) * 0.12 + Math.cos(now * 0.00009) * 0.03);
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(width, height) * 0.72);
            glow.addColorStop(0, rgba(accent, 0.27));
            glow.addColorStop(0.28, rgba(primary, 0.12));
            glow.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.globalCompositeOperation = "screen";
            for (let i = -2; i < 8; i += 1) {
              const x = ((i / 6) * width + scrollEase * width * 0.42 + Math.sin(now * 0.00012 + i) * 80) % (width + 280) - 140;
              const beam = ctx.createLinearGradient(x, -height * 0.2, x + 140, height * 1.15);
              beam.addColorStop(0, "rgba(255,255,255,0)");
              beam.addColorStop(0.5, rgba(accent, 0.08));
              beam.addColorStop(1, "rgba(255,255,255,0)");
              ctx.fillStyle = beam;
              ctx.beginPath();
              ctx.moveTo(x, -40);
              ctx.lineTo(x + 150, -40);
              ctx.lineTo(x - 160, height + 40);
              ctx.lineTo(x - 310, height + 40);
              ctx.closePath();
              ctx.fill();
            }
            ctx.restore();

            ctx.save();
            ctx.globalAlpha = 0.28;
            ctx.strokeStyle = "rgba(255,255,255,0.12)";
            ctx.lineWidth = 1;
            const grid = 86;
            const shift = (scrollEase * 130) % grid;
            for (let x = -grid; x < width + grid; x += grid) {
              ctx.beginPath();
              ctx.moveTo(x + shift, 0);
              ctx.lineTo(x + shift, height);
              ctx.stroke();
            }
            for (let y = -grid; y < height + grid; y += grid) {
              ctx.beginPath();
              ctx.moveTo(0, y + shift * 0.6);
              ctx.lineTo(width, y + shift * 0.6);
              ctx.stroke();
            }
            ctx.restore();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(now * 0.00008 + scrollEase * Math.PI * 1.7);
            ctx.strokeStyle = rgba(accent, 0.26);
            ctx.lineWidth = 1.2;
            for (let i = 0; i < 4; i += 1) {
              ctx.beginPath();
              ctx.ellipse(0, 0, 120 + i * 92, 38 + i * 28, i * 0.62, 0, Math.PI * 2);
              ctx.stroke();
            }
            ctx.restore();

            ctx.save();
            ctx.globalCompositeOperation = "lighter";
            particles.forEach((p) => {
              const px = ((p.x * width + Math.sin(now * 0.0002 * p.drift + p.phase) * 42 + scrollEase * width * p.speed) % (width + 40)) - 20;
              const py = ((p.y * height + Math.cos(now * 0.00016 * p.drift + p.phase) * 32 - scrollEase * height * (0.24 + p.speed)) % (height + 40)) - 20;
              ctx.fillStyle = rgba(p.depth > 0.48 ? accent : [255, 255, 255], 0.2 + p.depth * 0.32);
              ctx.beginPath();
              ctx.arc(px, py, p.size, 0, Math.PI * 2);
              ctx.fill();
            });
            ctx.restore();

            const vignette = ctx.createRadialGradient(width / 2, height / 2, height * 0.22, width / 2, height / 2, width * 0.75);
            vignette.addColorStop(0, "rgba(0,0,0,0)");
            vignette.addColorStop(1, "rgba(0,0,0,0.74)");
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, height);

            raf = requestAnimationFrame(draw);
          }

          function movePointer(event) {
            pointer.x += (event.clientX / window.innerWidth - pointer.x) * 0.2;
            pointer.y += (event.clientY / window.innerHeight - pointer.y) * 0.2;
          }

          resize();
          window.addEventListener("resize", resize);
          window.addEventListener("pointermove", movePointer);
          raf = requestAnimationFrame(draw);
          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener("resize", resize);
            window.removeEventListener("pointermove", movePointer);
          };
        }, []);

        return <canvas className="own-video-canvas" ref={canvasRef} aria-hidden="true" />;
      }

          ? {
              href,
              ...(isInternal ? {} : { target: "_blank", rel: "noopener noreferrer" }),
              onClick: isInternal
                ? (event) => {

                    scrollToSection(href.slice(1));

                : undefined

        return (
          <MotionTag
            className={`liquid-button ${secondary ? "secondary" : ""} ${className}`}
            whileHover={{ y: -5, scale: 1.025 }}
            whileTap={{ scale: 0.97 }}
            transition={{ type: "spring", stiffness: 340, damping: 20 }}
            {...props}
          >
            {children}
          </MotionTag>
        );

            <div className="card-grid education-grid">
              {education.map((item, index) => (
                <Card key={item.label} delay={index * 0.06}>
                  <p className="kicker">{tr(item.label, lang)}</p>
                  <div className="big-stat education-score">{item.score}</div>
                  <p>{tr(item.detail, lang)}</p>
                </Card>
              ))}
            </div>
            <div className="tag-row">
              <span className="tag">{t.board}</span>
              <span className="tag">{t.country}</span>
            </div>
          </Section>
        );
      }

      function Certificates({ lang }) {
        const t = text[lang];
        return (
          <Section id="certificates" kicker={tr("Proof of Learning", lang)} title={t.certTitle} copy={t.certCopy}>
            <div className="cert-list">
              {certificates.map((cert, index) => (
                <Card key={cert.title} delay={index * 0.06}>
                  <p className="kicker">{cert.done ? t.statusCompleted : t.statusPending}</p>
                  <h3>{tr(cert.title, lang)}</h3>
                  <p>{tr(cert.subtitle, lang)}</p>
                  <div className="button-row">
                    {cert.href ? <LiquidButton href={cert.href}>{t.viewCert}</LiquidButton> : <UploadButton>{t.addCert}</UploadButton>}
                  </div>
                </Card>
              ))}
            </div>
          </Section>
        );
      }

      function Projects({ lang, openMedia, openVideo }) {
        const t = text[lang];
        return (
          <motion.section
            id="projects"
            className="section-shell"
            initial={{ opacity: 0 }}
            whileInView={{ opacity: 1 }}
            viewport={{ once: false, amount: 0.12 }}
            transition={{ duration: 0.7 }}
          >
            <div className="section-inner project-section-inner">
              <div className="project-heading-block">
                <p className="kicker">{tr("Python Security Work", lang)}</p>
                <h2 className="section-title">
                  <BlurText>{t.projectTitle}</BlurText>
                </h2>
                <p className="section-copy">{t.projectCopy}</p>
              </div>
              <div className="project-lab-grid">
                <Card className="project-lab-panel">
                  <p className="kicker">{tr("Project Method", lang)}</p>
                  <h3>{tr("From input to evidence", lang)}</h3>
                  <p>
                    {tr("I built both projects as small security workflows, starting with safe inputs and ending with readable reports that show what the tool found.", lang)}
                  </p>
                  <div className="project-lab-flow">
                    <div className="project-flow-step">
                      <strong>{tr("1. Authorized input", lang)}</strong>
                      <span>{tr("I used sample logs and localhost/private lab targets so the testing stayed ethical and controlled.", lang)}</span>
                    </div>
                    <div className="project-flow-step">
                      <strong>{tr("2. Python analysis", lang)}</strong>
                      <span>{tr("I wrote Python logic to parse data, identify patterns, and keep the output understandable for review.", lang)}</span>
                    </div>
                    <div className="project-flow-step">
                      <strong>{tr("3. Clear report", lang)}</strong>
                      <span>{tr("I saved terminal output, screenshots, and report files so the results can be checked clearly.", lang)}</span>
                    </div>
                  </div>
                </Card>
                <div style={{ display: "grid", gap: 22 }}>
                  {projectData.map((project, index) => (
                    <Card key={project.title} className="project-card" delay={index * 0.08}>
                      <div className="project-copy">
                        <div>
                          <p className="kicker">{tr(project.type, lang)}</p>
                          <h3>{tr(project.title, lang)}</h3>
                          <p>{tr(project.desc, lang)}</p>
                          <div className="tag-row">
                            <span className="tag">{project.tech}</span>
                            <span className="tag">{tr("Educational", lang)}</span>
                            <span className="tag">{tr("Authorized Testing", lang)}</span>
                            <span className="tag">{tr("Ethical", lang)}</span>
                          </div>
                        </div>
                        <div className="button-row">
                          <LiquidButton href={project.github}>{t.github}</LiquidButton>
                          <LiquidButton onClick={() => openVideo({ ...project, demoCaption: tr(project.demoCaption, lang) })} secondary>
                            {t.viewDemo}
                          </LiquidButton>
                        </div>
                      </div>
                      <div className="project-media-grid">
                        {project.media.map((item) => {
                          const caption = tr(item.caption, lang);
                          return (
                            <motion.button className="media-tile" key={item.src} onClick={() => openMedia({ ...item, caption })} whileHover={{ y: -8, scale: 1.015 }} whileTap={{ scale: 0.98 }}>
                              <img src={item.src} alt={caption} />
                              <span>{caption}</span>
                            </motion.button>
                          );
                        })}
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            </div>
          </motion.section>
        );
      }

      function Art({ lang }) {
        const t = text[lang];
        return (
          <Section id="art" kicker={tr("Art / Portraits", lang)} title={t.artTitle} copy={t.artCopy}>
            <div className="art-grid">
              {[1, 2, 3, 4].map((num, index) => (
                <Card key={num} className="art-card" delay={index * 0.06}>
                  <h3>{lang === "ko" ? `${tr("Graphite Portrait", lang)} ${num}` : `Graphite Portrait ${num}`}</h3>
                  <UploadButton>{t.addPhoto}</UploadButton>
                </Card>
              ))}
            </div>
          </Section>
        );
      }

      function Skills({ lang }) {
        const t = text[lang];
        return (
          <Section id="skills" kicker={tr("Learning Stack", lang)} title={t.skillsTitle} copy={t.skillsCopy}>
            <div className="skills-grid">
              {skillGroups.map(([group, items], index) => (
                <Card key={group} className="skill-card" delay={index * 0.05}>
                  <h3>{tr(group, lang)}</h3>
                  <ul>
                    {items.map((skill) => (
                      <li key={skill}>{tr(skill, lang)}</li>
                    ))}
                  </ul>
                </Card>
              ))}
            </div>
          </Section>
        );
      }

      function Goals({ lang }) {
        const t = text[lang];
        return (
          <Section id="goals" kicker={tr("Future Direction", lang)} title={t.goalsTitle} copy={t.goalsCopy}>
            <div className="card-grid two">
              <Card>
                <h3>{tr("Cybersecurity Focus", lang)}</h3>
                <p>{t.goalsCopy}</p>
              </Card>
              <Card>
                <h3>{tr("Korea Readiness", lang)}</h3>
                <p>{t.goalsKorea}</p>
              </Card>
            </div>
          </Section>
        );
      }

      function Contact({ lang }) {
        const t = text[lang];
        return (
          <Section id="contact" kicker={tr("Contact", lang)} title={t.contactTitle} copy={t.contactCopy}>
            <Card className="contact-panel">
              <div>
                <h3>Nandi Varun Reddy</h3>
                <p>{email}</p>
                <p>{tr("GitHub: iam-varun2008", lang)}</p>
              </div>
              <div className="button-row" style={{ marginTop: 0, justifyContent: "flex-end" }}>
                <LiquidButton secondary>{email}</LiquidButton>
                <LiquidButton href={githubProfile}>{t.github}</LiquidButton>
              </div>
            </Card>
          </Section>
        );
      }

      function MediaModal({ modal, close, lang }) {
        const t = text[lang];
        return (
          <AnimatePresence>
            {modal && (
              <motion.div
                key={`${modal.type}-${modal.src}`}
                className="modal-backdrop"
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                onClick={close}
              >
                <motion.div
                  className="modal-card"
                  initial={{ opacity: 0, scale: 0.92, y: 28 }}
                  animate={{ opacity: 1, scale: 1, y: 0 }}
                  exit={{ opacity: 0, scale: 0.96, y: 20 }}
                  transition={{ type: "spring", stiffness: 180, damping: 22 }}
                  onClick={(event) => event.stopPropagation()}
                >
                  {modal.type === "video" ? <video className="modal-media" src={modal.src} controls autoPlay /> : <img className="modal-media" src={modal.src} alt={modal.caption} />}
                  <div className="modal-caption">
                    <span>{modal.caption}</span>
                    <button className="close-button" type="button" onClick={close}>
                      {t.close}
                    </button>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        );
      }

      function App() {
        const [lang, setLang] = useState("en");
        const [gate, setGate] = useState(true);
        const [active, setActive] = useState("home");
        const [modal, setModal] = useState(null);
        const { scrollYProgress } = useScroll();
        const scaleX = useTransform(scrollYProgress, [0, 1], [0, 1]);

        useEffect(() => {
          document.body.classList.toggle("gate-open", gate);
        }, [gate]);

        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              const visible = entries.find((entry) => entry.isIntersecting);
              if (visible) setActive(visible.target.id);
            },
            { rootMargin: "-42% 0px -42% 0px", threshold: 0 }
          );
          navItems.forEach(([id]) => {
            const node = document.getElementById(id);
            if (node) observer.observe(node);
          });
          return () => observer.disconnect();
        }, []);

        function choose(nextLang) {
          setLang(nextLang);
          setGate(false);
        }

        return (
          <>
            <ScrollCanvas />
            <div className="ambient-layer" />
            <div className="grain" />
            <motion.div className="scroll-progress" style={{ scaleX }} />
            <Navbar lang={lang} setLang={setLang} active={active} />
            <AnimatePresence>{gate && <Gate key="language-gate" choose={choose} />}</AnimatePresence>
            <main className="page" aria-hidden={gate ? "true" : "false"}>
              <Hero lang={lang} />
              <About lang={lang} />
              <Education lang={lang} />
              <Certificates lang={lang} />
              <Projects lang={lang} openMedia={(item) => setModal({ type: "image", ...item })} openVideo={(project) => setModal({ type: "video", src: project.demo, caption: project.demoCaption })} />
              <Art lang={lang} />
              <Skills lang={lang} />
              <Goals lang={lang} />
              <Contact lang={lang} />
            </main>
            <MediaModal modal={modal} close={() => setModal(null)} lang={lang} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
